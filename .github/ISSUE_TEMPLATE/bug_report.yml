name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: version
    attributes:
      label: Package Version
      description: Which version of `serverless-spa-construct` are you using?
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: cdk-version
    attributes:
      label: AWS CDK Version
      description: Which version of `aws-cdk-lib` are you using?
      placeholder: e.g. 2.189.1
    validations:
      required: true

  - type: dropdown
    id: construct
    attributes:
      label: Affected Construct
      description: Which construct is affected?
      multiple: true
      options:
        - ServerlessSpaConstruct
        - ServerlessSpaSecurityConstruct
        - DatabaseConstruct
        - AuthConstruct
        - ApiConstruct
        - FrontendConstruct
        - WafConstruct
        - CertificateConstruct
        - SecretConstruct
        - LambdaEdgeConstruct
        - SsmConstruct
        - Other
    validations:
      required: true

  - type: dropdown
    id: factory-method
    attributes:
      label: Factory Method (if applicable)
      description: Which factory method are you using?
      options:
        - N/A (using low-level constructs)
        - minimal()
        - withWaf()
        - withCustomDomain()
        - withCustomDomainAndWaf()
        - withCertificate()
        - withWafAndCertificate()

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        1. Create a stack with ...
        2. Run `cdk synth` or `cdk deploy`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or CloudFormation errors if applicable.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any additional context, stack traces, or screenshots.
